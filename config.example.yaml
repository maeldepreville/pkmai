auto_links:
  enabled: true
  similarity_threshold: 0.55
  max_links_per_note: 5
  min_note_chars: 50
  section_title: "Notes Connexes"
  allow_rewrite_related_section: true
  insert_only_if_missing: true
  embedding:
    model_name: "BAAI/bge-m3"
  cache:
    db_path: "data/embeddings_cache.sqlite3"


author_mirror:
  enabled: true
  output_dir: &mirror_dir "Auteurs Miroirs"
  prefix: "[Auteur-Miroir]"
  section_title: "Auteur Miroir"
  min_chars: 120
  max_note_chars: 24000
  overwrite_existing: true
  model:
    path: "/path/to/your/local/model"
    n_ctx: 4096
    n_threads: 4
    max_tokens: 1024
    temperature: 0.3
    repeat_penalty: 1.15
  cache:
    db_path: "data/author_mirror_cache.sqlite3"


vault:
  path: "/path/to/your/vault"
  notes_root_dir: "YourNotesDirName"
  ignored_dirs:
    - ".obsidian"
    - "Templates"
    - "Archive"
    - "logs"
    - "data"
    - *mirror_dir